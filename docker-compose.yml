version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sweetcraft}
      POSTGRES_USER: ${POSTGRES_USER:-sweetcraft_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sweetcraft_user} -d ${POSTGRES_DB:-sweetcraft}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "5534:5000"
    volumes:
      - ./static/uploads:/app/static/uploads
      - ./backups:/app/backups
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "8834:80" 
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data: