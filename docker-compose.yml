version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sweetcraft}
      POSTGRES_USER: ${POSTGRES_USER:-sweetcraft_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5437:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sweetcraft_user} -d ${POSTGRES_DB:-sweetcraft}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "5534:5000"
    volumes:
      - ./static/uploads:/app/static/uploads
      - ./backups:/app/backups
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "8834:80" 
    depends_on:
      - backend
    restart: always

  # ── Sidecar Cron Container ──────────────────────────────────────────────────
  # Replaces APScheduler inside Flask. Triggers the backup API every night at
  # 2 AM using curl. This keeps the Flask process stateless and avoids issues
  # with Gunicorn multi-worker scheduler duplication.
  backup-cron:
    image: alpine:3.19
    restart: always
    depends_on:
      - backend
    env_file:
      - .env
    # Install curl, then write a crontab and run crond in foreground
    command: >
      sh -c "apk add --no-cache curl &&
             echo '0 2 * * * curl -s -X POST http://backend:5000/api/backups/create
             -H \"X-Shop-Username: admin\"
             -H \"X-Cron-Secret: $${CRON_SECRET:-sweetcraft_cron_2am}\"
             >> /var/log/backup_cron.log 2>&1' | crontab - &&
             crond -f -l 2"

volumes:
  postgres_data: